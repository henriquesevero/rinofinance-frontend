<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <linearGradient id="gold" gradientUnits="userSpaceOnUse" x1="10" y1="6" x2="30" y2="34">
      <stop offset="0%" stop-color="#FCEFC4" />
      <stop offset="45%" stop-color="#E8B93B" />
      <stop offset="100%" stop-color="#9C6E0B" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE9A8" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#FFE9A8" stop-opacity="0" />
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.3" />
    </filter>
  </defs>

  <rect width="40" height="40" rx="10" fill="#0A0A0A" />

  <circle cx="29" cy="10" r="3.6" fill="url(#glow)" filter="url(#blur)" />

  <circle cx="20" cy="20" r="13.4" fill="none" stroke="url(#gold)" stroke-width="2.8" />
  <circle cx="20" cy="20" r="12" fill="none" stroke="#7A5C0A" stroke-width="0.5" opacity="0.7" />

  <text
    x="20"
    y="29"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="27"
    font-weight="700"
    fill="url(#gold)"
  >$</text>
</svg>
